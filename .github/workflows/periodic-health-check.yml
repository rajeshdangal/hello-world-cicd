name: Periodic Health Check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  health_check:
    runs-on: ubuntu-latest
    steps:
      - name: Check health endpoint
        uses: jtalk/url-health-check-action@v4
        with:
          url: https://YOUR-APP-URL.onrender.com/health
          max-attempts: 3
          retry-delay: 5s